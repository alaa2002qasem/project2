<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier - Modern Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#fcfcfc]">

    <main class="w-full max-w-[1344px] mx-auto bg-white shadow-sm overflow-hidden">
        
        <header class="flex items-center justify-between px-6 py-6 border-b border-gray-50">
            <nav class="flex items-center gap-6">
                <i class="fa-solid fa-magnifying-glass text-sm cursor-pointer hover:opacity-50"></i>
                <ul class="hidden md:flex items-center gap-6 text-[11px] tracking-widest uppercase font-medium">
                    <li><a href="#" class="text-black">Home</a></li>
                    <li><a href="#" class="text-gray-400 hover:text-black transition">Shop</a></li>
                    <li><a href="#" class="text-gray-400 hover:text-black transition">Collections</a></li>
                </ul>
            </nav>

            <div class="serif-font text-2xl tracking-[0.2em] font-medium absolute left-1/2 -translate-x-1/2">
                ATELIER
            </div>

            <div class="flex items-center gap-5 text-sm">
                <i class="fa-solid fa-user cursor-pointer hover:opacity-50 hidden sm:block"></i>
                <i class="fa-solid fa-bag-shopping cursor-pointer hover:opacity-50"></i>
            </div>
        </header>

        <section class="relative w-full h-[500px] md:h-[795px] overflow-hidden group">
            <img 
                src="img/unnamed.webp" 
                alt="Modern Home Interior" 
                class="absolute inset-0 w-full h-full object-cover transition-transform duration-[2s] group-hover:scale-110"
            >

            <div class="absolute inset-0 bg-white/5"></div>

            <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-8">
                <span class="uppercase tracking-[0.4em] text-[10px] md:text-xs mb-6 text-gray-800 font-light">
                    New Collection
                </span>
                
                <h1 class="serif-font text-gray-900 text-4xl md:text-7xl leading-[1.15] mb-12 max-w-2xl">
                    Quiet Luxury for the <br class="hidden md:block"> Modern Home
                </h1>

                <button class="bg-black text-white px-12 py-4 text-[10px] uppercase tracking-[0.3em] font-medium hover:bg-neutral-800 transition-all duration-500 shadow-xl">
                    Explore the Edit
                </button>
            </div>
        </section>
    </main>


   
<section class="px-[53px] py-20 w-full max-w-[1344px] mx-auto">
    
    <div class="grid grid-cols-1 md:grid-cols-4 gap-[24px] h-auto md:h-[960px]">
        
       
        <div class="md:col-span-2 md:row-span-2 relative group overflow-hidden cursor-pointer">
            <img src="img/Background.webp" alt="Decor" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
            <div class="absolute bottom-10 left-10 text-white">
                <p class="uppercase text-[10px] tracking-[0.3em] mb-2 opacity-80">Decor</p>
                <h3 class="serif-font text-xl tracking-wider">SHOP COLLECTION</h3>
            </div>
        </div>

        
        <div class="md:col-span-2 relative group overflow-hidden cursor-pointer h-[468px]">
            <img src="img/Background (1).webp" alt="Plants" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
            <div class="absolute bottom-10 left-10 text-white">
                <p class="uppercase text-[10px] tracking-[0.3em] mb-2 opacity-80">Plants</p>
                <h3 class="serif-font text-xl tracking-wider">BROWSE GREENERY</h3>
            </div>
        </div>

        <!-- العنصر السفلي يسار (Gifts) -->
        <div class="relative group overflow-hidden cursor-pointer h-[468px]">
            <img src="img/Background (2).webp" alt="Gifts" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
            <div class="absolute bottom-8 left-8 text-white">
                <p class="uppercase text-[10px] tracking-[0.3em] mb-1 opacity-80">Gifts</p>
                <p class="text-[11px] font-light tracking-[0.1em]">CURATED SETS</p>
            </div>
        </div>

        <!-- العنصر السفلي يمين (Accessories) -->
        <div class="relative group overflow-hidden cursor-pointer h-[468px]">
            <img src="img/Background (3).webp" alt="Accessories" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
            <div class="absolute bottom-8 left-8 text-white">
                <p class="uppercase text-[10px] tracking-[0.3em] mb-1 opacity-80">Accessories</p>
                <p class="text-[11px] font-light tracking-[0.1em]">DAILY ESSENTIALS</p>
            </div>
        </div>

    </div>
</section>

</body>
</html>
